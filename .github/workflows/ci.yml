name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  ci:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint

      # Audit production dependencies (fail on moderate+ vulnerabilities)
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=moderate

      # Run unit tests with coverage (Linux only for performance)
      - run: npm run test:unit:coverage
        if: runner.os == 'Linux'

      # Upload coverage report
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: runner.os == 'Linux'
        with:
          name: coverage-report
          path: coverage/

      # Run unit tests without coverage on Windows/Mac
      - run: npm run test:unit
        if: runner.os != 'Linux'

      # Build once, then run E2E against the production bundle.
      # Packaging invokes vscode:prepublish, so it also performs the Linux build.
      - name: Build production extension (Windows/macOS)
        run: npm run build -- --production
        if: runner.os != 'Linux'
      - name: Package extension (Linux)
        run: npm run package
        if: runner.os == 'Linux'

      # Install .NET SDK and tsqlrefine CLI for E2E tests
      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: '8.0.x'
      - name: Install tsqlrefine CLI
        run: dotnet tool install -g TSQLRefine
      - name: Verify tsqlrefine installation
        run: tsqlrefine --version

      # Run E2E tests on Linux with xvfb
      - name: Run E2E tests (Linux)
        run: xvfb-run -a npx vscode-test
        if: runner.os == 'Linux'

      # Run E2E tests on Windows/macOS
      - name: Run E2E tests (Windows/macOS)
        run: npx vscode-test
        if: runner.os != 'Linux'

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: runner.os == 'Linux'
        with:
          name: vsix-package
          path: '*.vsix'
